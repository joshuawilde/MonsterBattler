# MonsterBattler production stack (one OVH VPS). Caddy terminates TLS (auto Let's Encrypt for
# the OVH hostname) and is the ONLY public surface; backend + battle server are internal-only.
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - battle

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - mbdata:/data
      - ../secrets/firebase-sa.json:/data/firebase-sa.json:ro
    environment:
      DB_PATH: /data/monsterbattler.db
      GOOGLE_APPLICATION_CREDENTIALS: /data/firebase-sa.json
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # register matches over the internal network; hand clients the public plain-ws URL.
      # Plain ws (not wss): Unity's Mono TLS can't complete a wss handshake (editor + iOS),
      # so the battle relay runs unencrypted on a direct public port. Only move/switch choices
      # and chat cross it — all sensitive traffic (auth, profile, Elo, results) stays on HTTPS.
      BATTLE_SERVERS: http://battle:8081
      # IPv4 literal, NOT the hostname: the hostname has both A + AAAA records, and Unity/Mono's
      # WebSocket connect has no Happy-Eyeballs fallback — it can pick the IPv6 address and hang
      # when the client has no IPv6 route to the VPS. Plain ws has no TLS, so an IP literal is fine.
      WS_PUBLIC_URLS: ws://15.204.93.121:8081/ws

  battle:
    build:
      context: ..
      dockerfile: battle-server/Dockerfile
    restart: unless-stopped
    # public plain-ws port (clients connect directly, bypassing Caddy/TLS)
    ports:
      - "8081:8081"
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BACKEND_URL: http://backend:8080

volumes:
  mbdata:
  caddy_data:
  caddy_config:
